{% extends 'base2.html' %}
{% load i18n %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<div class="h-full flex flex-col animate-in fade-in duration-700">
    <div class="mb-6 flex justify-between items-center">
        <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tight">
            Geospatial <span class="text-blue-600">Intelligence</span>
        </h2>
        <div class="flex gap-4">
            <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl border border-blue-100 shadow-sm">
                <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                <span class="text-[10px] font-bold text-slate-500 uppercase">Safe</span>
            </div>
            <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl border border-blue-100 shadow-sm">
                <span class="w-3 h-3 bg-red-500 rounded-full"></span>
                <span class="text-[10px] font-bold text-slate-500 uppercase">Critical</span>
            </div>
        </div>
    </div>

    <div id="main-intelligence-map" class="flex-1 rounded-[3rem] border-4 border-white shadow-2xl overflow-hidden"></div>
</div>

<script>
    var map = L.map('main-intelligence-map').setView([20.5937, 78.9629], 5);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    var bounds = [];

    {% for p in points %}
        {% if p.latitude and p.longitude %}
            var lat = {{ p.latitude }};
            var lng = {{ p.longitude }};
            bounds.push([lat, lng]);

            var color = "#22c55e";
            if ("{{ p.status_category }}" === "Critical") color = "#ef4444";
            if ("{{ p.status_category }}" === "Over-Exploited") color = "#f59e0b";

            L.circleMarker([lat, lng], {
                radius: 12,
                fillColor: color,
                color: "#ffffff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.9
            })
            .addTo(map)
            .bindPopup(
                "<b>{{ p.district }}</b><br>Status: {{ p.status_category }}"
            );
        {% endif %}
    {% endfor %}

    if (bounds.length > 0) {
        map.fitBounds(bounds, { padding: [50, 50] });
    }
</script>
{% endblock %}
