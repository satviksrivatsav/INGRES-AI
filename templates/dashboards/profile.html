{% extends 'base2.html' %}
{% load i18n %}

{% block content %}

<div class="max-w-4xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-700">

    <!-- HEADER -->
    <div class="mb-10">
        <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">
            Profile <span class="text-blue-600">Settings</span>
        </h2>

        <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mt-1">
            Manage your personal and regional information
        </p>
    </div>


    <!-- PROFILE FORM -->
    <div class="bg-white rounded-[3rem] border border-blue-100 shadow-sm overflow-hidden">

        <div class="p-8 border-b border-blue-50 flex items-center justify-between bg-blue-50/30">
            <h3 class="text-[10px] font-black text-slate-800 uppercase tracking-[0.2em]">
                Personal Information
            </h3>

            <i class="fa-solid fa-user text-blue-600"></i>
        </div>


        <form method="POST" class="p-10 space-y-6">

            {% csrf_token %}

            <!-- NAME -->
            <div class="grid md:grid-cols-2 gap-6">

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">
                        First Name
                    </label>

                    <input
                        type="text"
                        name="first_name"
                        value="{{ user.first_name }}"
                        class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl font-bold text-sm text-slate-700 focus:border-blue-500 outline-none">
                </div>


                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">
                        Last Name
                    </label>

                    <input
                        type="text"
                        name="last_name"
                        value="{{ user.last_name }}"
                        class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl font-bold text-sm text-slate-700 focus:border-blue-500 outline-none">
                </div>

            </div>


            <!-- EMAIL -->
            <div class="space-y-2">

                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">
                    Email Address
                </label>

                <input
                    type="email"
                    value="{{ user.email }}"
                    disabled
                    class="w-full bg-gray-100 border border-gray-200 p-4 rounded-2xl text-gray-500 font-bold text-sm cursor-not-allowed">

            </div>


            <!-- LOCATION -->
            <div class="grid md:grid-cols-2 gap-6">

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">
                        State
                    </label>

                    <input
                        type="text"
                        name="state"
                        value="{{ profile.state }}"
                        class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl font-bold text-sm text-slate-700 focus:border-blue-500 outline-none">
                </div>


                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">
                        District
                    </label>

                    <input
                        type="text"
                        name="district"
                        value="{{ profile.district }}"
                        class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl font-bold text-sm text-slate-700 focus:border-blue-500 outline-none">
                </div>

            </div>


            <!-- PHONE -->
            <div class="space-y-2">

                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">
                    Phone Number
                </label>

                <input
                    type="text"
                    name="phone"
                    value="{{ profile.phone }}"
                    class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl font-bold text-sm text-slate-700 focus:border-blue-500 outline-none">

            </div>


            <!-- SUBMIT -->
            <div class="pt-6">

                <button
                    type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-2xl font-black uppercase tracking-widest text-xs transition-all shadow-lg shadow-blue-600/20">

                    Update Profile

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
