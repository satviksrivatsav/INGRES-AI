{% extends "admin/change_list.html" %}
{% load i18n %}

{% block object-tools-items %}
<li>
    <form action="import-data/" method="post" enctype="multipart/form-data"
        style="display:inline-flex; align-items:center; gap:8px;">
        {% csrf_token %}
        <input type="file" name="data_file" accept=".csv,.json" required style="font-size:12px; padding:4px;">
        <button type="submit" class="button" style="padding:6px 12px;">
            Import Groundwater Data
        </button>
    </form>
</li>
{{ block.super }}
{% endblock %}
