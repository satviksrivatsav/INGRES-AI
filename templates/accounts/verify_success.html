{% extends 'base1.html' %}
{% load i18n %}
{% block title %}Verification Successful | INGRES-AI{% endblock %}

{% block content %}
<div class="flex items-center justify-center py-20 px-4 bg-slate-50/50">
    <div class="max-w-md w-full text-center bg-white/90 backdrop-blur-xl p-12 rounded-[2.5rem] border border-blue-100 shadow-[0_25px_60px_rgba(0,51,102,0.05)] relative overflow-hidden">
        
        <div class="absolute -top-12 -left-12 w-40 h-40 bg-cyan-100 rounded-full blur-3xl opacity-60"></div>

        <div class="w-24 h-24 bg-blue-50 border border-blue-100 rounded-full flex items-center justify-center mx-auto mb-8 shadow-sm">
            <i class="fa-solid fa-circle-check text-5xl text-blue-600 animate-bounce"></i>
        </div>

        <h1 class="heading-font text-3xl font-extrabold text-slate-900 mb-4 tracking-tight">
            Account <span class="text-blue-600">Verified</span>
        </h1>

        <p class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.25em] leading-relaxed mb-12 px-2">
            Identity confirmed. Your profile is now fully active[cite: 908, 966]. <br>
            <span class="text-slate-500">Redirecting to your personalized dashboard...</span>
        </p>
        
        <div class="space-y-6">
            <a href="{% url 'accounts:login' %}"
               class="btn-tech-glow w-full text-white py-5 rounded-2xl font-black uppercase tracking-[0.3em] text-[11px] flex items-center justify-center gap-3 active:scale-95 transition-all shadow-lg">
                <i class="fa-solid fa-gauge-high"></i> Enter Dashboard
            </a>
            
            <div class="flex items-center justify-center gap-2">
                <div class="w-1.5 h-1.5 bg-blue-600 rounded-full animate-pulse"></div>
                <div class="w-1.5 h-1.5 bg-blue-400 rounded-full animate-pulse delay-75"></div>
                <div class="w-1.5 h-1.5 bg-blue-200 rounded-full animate-pulse delay-150"></div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Unique Success State UI Elements */
    .btn-tech-glow {
        background: linear-gradient(135deg, #003366, #0077be);
        box-shadow: 0 10px 25px rgba(0, 51, 102, 0.15);
    }
    
    .btn-tech-glow:hover {
        box-shadow: 0 15px 35px rgba(0, 242, 255, 0.4);
        transform: translateY(-2px);
    }
</style>
{% endblock %}
