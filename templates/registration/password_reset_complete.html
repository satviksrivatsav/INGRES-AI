{% extends "base1.html" %}
{% load i18n %}
{% block title %}Reset Password | INGRES-AI{% endblock %}

{% block content %}
<div class="flex items-center justify-center py-20 px-4 bg-slate-50/50">
    <div class="max-w-md w-full bg-white/90 backdrop-blur-xl p-10 rounded-[2.5rem] border border-blue-100 shadow-[0_25px_60px_rgba(0,51,102,0.05)] relative overflow-hidden text-center">
        
        <div class="w-20 h-20 bg-blue-50 border border-blue-100 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-sm">
            <i class="fa-solid fa-key text-3xl text-blue-600"></i>
        </div>

        <h1 class="heading-font text-3xl font-extrabold text-slate-900 mb-4 tracking-tight">Recover <span class="text-blue-600">Access</span></h1>
        <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-10 leading-relaxed">
            Enter your registered email to receive a secure recovery link.
        </p>

        <form method="post" class="space-y-8 relative z-10">
            {% csrf_token %}
            <div class="relative group">
                <i class="fa fa-envelope-open absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-600 transition-colors"></i>
                <input type="email" name="email" required placeholder="User Email Address" 
                       class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:bg-white focus:border-blue-400 focus:ring-4 focus:ring-blue-50 outline-none font-medium text-slate-700 transition-all">
            </div>

            <button type="submit" class="btn-tech-glow w-full text-white font-black py-5 rounded-2xl uppercase tracking-[0.3em] text-[11px] active:scale-95 transition-all">
                Send Recovery Link
            </button>
        </form>

        <div class="mt-10">
            <a href="{% url 'accounts:login' %}" class="text-[10px] font-black text-slate-400 hover:text-blue-900 uppercase tracking-[0.2em]">
                Return to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
