{% extends 'base1.html' %}
{% load i18n %}
{% block title %}Recover Access | INGRES-AI Groundwater Buddy{% endblock %}

{% block content %}
<div class="flex items-center justify-center py-24 px-4 bg-slate-50/50">
    <div class="max-w-md w-full bg-white/90 backdrop-blur-xl p-10 rounded-[2.5rem] border border-blue-100 shadow-[0_25px_60px_rgba(0,51,102,0.05)] relative overflow-hidden">
        
        <div class="absolute top-0 right-0 w-32 h-32 bg-cyan-100/40 rounded-full -mr-16 -mt-16 blur-3xl"></div>

        <div class="text-center relative z-10">
            <div class="w-20 h-20 bg-gradient-to-tr from-blue-600 to-cyan-500 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-lg transform rotate-3">
                <i class="fa-solid fa-key text-3xl text-white"></i>
            </div>
            <h1 class="heading-font text-3xl font-extrabold text-slate-900 mb-2 tracking-tight">
                Recover <span class="text-blue-600">Access</span>
            </h1>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.25em] mb-10">
                Initiate Secure Password Recovery
            </p>
        </div>

        <form method="post" class="space-y-8 relative z-10">
            {% csrf_token %}

            <div class="space-y-4">
                <div class="relative group">
                    <label class="text-[10px] font-black text-blue-900 uppercase tracking-widest ml-1 mb-2 block">
                        {% translate "Registered Account Email" %}
                    </label>
                    <div class="relative">
                        <i class="fa fa-envelope-open absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-600 transition-colors"></i>
                        <input
                            type="email"
                            name="email"
                            required
                            placeholder="{% translate 'yourname@domain.com' %}"
                            class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:bg-white focus:border-blue-400 focus:ring-4 focus:ring-blue-50 outline-none font-medium text-slate-700 placeholder-slate-300 transition-all"
                        >
                    </div>
                </div>
            </div>

            <button
                type="submit"
                class="btn-tech-glow w-full text-white font-black py-5 rounded-2xl uppercase tracking-[0.3em] text-[11px] mt-4 transition-all active:scale-95 shadow-lg">
                <i class="fa fa-paper-plane mr-2"></i> {% translate "Send Recovery Link" %}
            </button>
        </form>

        <div class="mt-10 text-center border-t border-slate-100 pt-8">
            <a href="{% url 'accounts:login' %}" class="text-[10px] font-black text-slate-400 hover:text-blue-900 uppercase tracking-[0.2em] transition-all">
                <i class="fa fa-arrow-left mr-1"></i> Return to Login
            </a>
        </div>
    </div>
</div>

<style>
    /* Specialized Oceanic-Tech Styles for INGRES-AI [cite: 643] */
    .btn-tech-glow {
        background: linear-gradient(135deg, #003366, #0077be);
        box-shadow: 0 10px 25px rgba(0, 51, 102, 0.15);
    }
    
    .btn-tech-glow:hover {
        box-shadow: 0 15px 35px rgba(0, 242, 255, 0.4);
        transform: translateY(-2px);
    }
</style>
{% endblock %}
